{% extends 'base.html' %}
{% block title %}管理者ログイン{% endblock %}
{% block content %}
<section class="card">
  <h2>管理者ログイン</h2>
  {% if admin_missing %}<p class="warn">管理者情報が未設定です</p>{% endif %}
  <form method="post" class="form">
    <label>管理者ユーザー名<input name="username" required></label>
    <label>管理者パスワード<input name="password" type="password" required></label>
    <button type="submit" {% if admin_missing %}disabled{% endif %}>ログイン</button>
  </form>
</section>
{% endblock %}
