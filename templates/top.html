{% extends 'base.html' %}
{% block content %}
<section class="card hero">
  <h2>商品名を入れるだけで、出品準備が整う。</h2>
  {% if usage %}
  <p><strong>本日の残り診断回数：{{ usage.daily_remaining }}回</strong> / 期間内の残り診断回数：{{ usage.monthly_remaining }}回</p>
  {% endif %}
  <p>初心者さん向けに、タイトル・説明文・価格の考え方までやさしくサポート。迷わずそのままメルカリ出品へ進めます。</p>
  <a class="button large" href="{{ url_for('diagnose') }}">商品診断をはじめる</a>
</section>
{% endblock %}
